<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>teamplts — SaaS Component Gallery</title>
<meta name="description" content="217 copy-paste SaaS UI components. 5 themes. Zero dependencies.">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:system-ui,-apple-system,sans-serif; background:#f8fafc; color:#0f172a; display:grid; place-items:center; min-height:100vh; padding:40px 20px; }
  main { max-width:640px; text-align:center; display:grid; gap:24px; }
  h1 { font-size:2.5rem; }
  h1 span { background:linear-gradient(135deg,#2563eb,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sub { color:#64748b; font-size:1.1rem; line-height:1.5; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin:8px 0; }
  .stat { padding:16px; background:#fff; border-radius:12px; border:1px solid #e2e8f0; }
  .stat strong { display:block; font-size:1.5rem; }
  .stat span { font-size:0.85rem; color:#64748b; }
  .btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .btn { padding:12px 28px; border-radius:10px; font-weight:600; text-decoration:none; font-size:1rem; }
  .btn-primary { background:#2563eb; color:#fff; }
  .btn-primary:hover { background:#1d4ed8; }
  .btn-ghost { background:#fff; color:#334155; border:1px solid #e2e8f0; }
  .btn-ghost:hover { background:#f1f5f9; }
  .foot { color:#94a3b8; font-size:0.85rem; }
  .foot a { color:#64748b; }
</style>
</head>
<body>
<main>
  <h1><span>teamplts</span></h1>
  <p class="sub">217 copy-paste UI components for SaaS dashboards. Browse, copy HTML, paste into your project. 5 themes. Zero external dependencies.</p>
  <div class="stats">
    <div class="stat"><strong>217</strong><span>Components</span></div>
    <div class="stat"><strong>16</strong><span>Categories</span></div>
    <div class="stat"><strong>5</strong><span>Themes</span></div>
    <div class="stat"><strong>0</strong><span>Dependencies</span></div>
  </div>
  <div class="btns">
    <a class="btn btn-primary" href="./gallery.html">Browse Gallery</a>
    <a class="btn btn-ghost" href="https://github.com/hugobeyer/teamplts">GitHub</a>
  </div>
  <div class="foot">
    MIT licensed · <a href="https://github.com/hugobeyer/teamplts">github.com/hugobeyer/teamplts</a>
  </div>
</main>
</body>
</html>

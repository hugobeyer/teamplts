<!doctype html>
<html lang="en" data-theme="clean">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>teamplts — Component Gallery</title>
        <script>
            if (!window.lucide)
                document.write(
                    '<script src="https://unpkg.com/lucide@latest"><\/script>',
                );
        </script>
        <link rel="stylesheet" href="./compact-saas-component-gallery.css" />
        <script>
            (function () {
                var saved =
                    (typeof localStorage !== "undefined" &&
                        localStorage.getItem("gallery-theme")) ||
                    "clean";
                document.documentElement.setAttribute("data-theme", saved);
                window.__galleryTheme = saved;
            })();
        </script>
    </head>
    <body>
        <div class="page">
            <header class="top">
                <div>
                    <h1>teamplts</h1>
                    <p class="sub">
                        217 copy-paste SaaS components. 5 themes. Click to copy.
                        <strong>Free.</strong>
                    </p>
                </div>
                <div class="tools">
                    <input
                        class="input search"
                        id="search"
                        placeholder="Search components..."
                    />
                    <div
                        class="seg"
                        id="filters"
                        aria-label="Gallery filters"
                    ></div>
                    <div
                        class="seg"
                        id="themeToggles"
                        aria-label="Theme switch"
                    ></div>
                    <button class="btn primary" id="copyAll" type="button">
                        <i data-lucide="copy"></i>Copy all
                    </button>
                </div>
            </header>
            <main id="gallery" class="gallery"></main>
        </div>
        <script src="./dist/gallery.bundle.js"></script>
    </body>
</html>
